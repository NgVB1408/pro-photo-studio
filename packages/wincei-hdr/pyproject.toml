[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "pps-wincei-hdr"
version = "0.1.0"
description = "HDR bracket fusion (Mertens) for Sony AEB → single LDR ảnh BĐS — feeds pps-wincei downstream."
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = "Apache-2.0"
authors = [{ name = "NgVB1408" }]
keywords = ["real-estate", "hdr", "bracket", "aeb", "mertens", "sony", "photo"]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Multimedia :: Graphics",
]
dependencies = [
    "numpy>=1.26",
    "opencv-python>=4.9",
    "Pillow>=10.0",
    "piexif>=1.1.3",
    "tqdm>=4.66",
]

[project.optional-dependencies]
chain = ["pps-wincei>=0.3"]

[project.scripts]
pps-wincei-hdr = "pps_wincei_hdr.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["pps_wincei_hdr"]
