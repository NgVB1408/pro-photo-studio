[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "pps-data"
version = "0.1.0"
description = "Pro Photo Studio — HF datasets streaming + FiftyOne views for FiveK / LSD / SUN"
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = "Apache-2.0"
authors = [{ name = "NgVB1408" }]
dependencies = [
    "pps-core",
    "datasets>=3.0",
    "huggingface-hub>=0.26",
    "typer>=0.13",
    "Pillow>=10.0",
    "numpy>=1.26",
]

[project.optional-dependencies]
fiftyone = ["fiftyone>=1.0"]
dev = ["pytest>=8", "pytest-mock>=3.14"]

[project.scripts]
pps-data = "pps_data.cli:app"

[tool.hatch.build.targets.wheel]
packages = ["pps_data"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"
