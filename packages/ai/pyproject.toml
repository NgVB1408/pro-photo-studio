[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "pps-ai"
version = "0.1.0"
description = "Pro Photo Studio — ML inference wrappers (Qwen-Image, SUPIR, SAM 2, ControlNet)"
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = "Apache-2.0"
authors = [{ name = "NgVB1408" }]
dependencies = [
    "pps-core",
    "torch>=2.5",
    "transformers>=4.45",
    "diffusers>=0.32",
    "accelerate>=1.0",
    "huggingface-hub>=0.26",
    "safetensors>=0.4",
]

[project.optional-dependencies]
sam2 = ["segment-anything-2>=1.0"]
lama = ["iopaint>=1.5"]
upscale-ncnn = ["realesrgan-ncnn-vulkan-python>=2.0"]
all = [
    "segment-anything-2>=1.0",
    "iopaint>=1.5",
    "realesrgan-ncnn-vulkan-python>=2.0",
]

[tool.hatch.build.targets.wheel]
packages = ["pps_ai"]
