[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "pps-ai"
version = "0.1.0"
description = "Pro Photo Studio — ML inference wrappers (Qwen-Image, SUPIR, SAM 2, ControlNet)"
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = "Apache-2.0"
authors = [{ name = "NgVB1408" }]
dependencies = [
    "pps-core",
    "torch>=2.5",
    "transformers>=4.45",
    "diffusers>=0.32",
    "accelerate>=1.0",
    "huggingface-hub>=0.26",
    "safetensors>=0.4",
]

# Note: optional ML backends are NOT declared as pip extras because their
# distribution mechanism varies:
#   - SAM 2: install via `pip install git+https://github.com/facebookresearch/segment-anything-2`
#   - LaMa: install via direct ONNX runtime (skip iopaint — pins hf-hub<0.26)
#   - Real-ESRGAN ncnn-vulkan: precompiled binary, invoked via subprocess
# These get wired in Phase 3 with explicit install instructions in docs/MODELS.md.

[tool.hatch.build.targets.wheel]
packages = ["pps_ai"]
