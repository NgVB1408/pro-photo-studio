name: Build Desktop .exe

on:
  workflow_dispatch:
  push:
    tags: ["desktop-v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps (CPU bundle — GPU torch installed at first-run on user machine)
        run: |
          python -m pip install --upgrade pip
          pip install -e packages/core[raw,sky-ai]
          pip install -e packages/desktop
          pip install pyinstaller>=6.11
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install spandrel rembg onnxruntime

      - name: Smoke test GPU detector
        env:
          PYTHONIOENCODING: utf-8
        run: |
          python -X utf8 -c "from pps_core.device import describe_device; print(describe_device())"

      - name: Build single-file exe
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name "ProPhotoStudio" `
            --collect-all PySide6 `
            --collect-all shiboken6 `
            --collect-all cv2 `
            --collect-all torch `
            --collect-all spandrel `
            --collect-all rembg `
            --collect-all onnxruntime `
            --collect-data pps_core `
            --hidden-import="pps_core.device" `
            --hidden-import="pps_core.upscale" `
            --hidden-import="pps_core.realestate" `
            --hidden-import="pps_core.hdr" `
            packages/desktop/pps_desktop/__main__.py

      - name: List dist
        run: |
          dir dist
          (Get-Item dist\ProPhotoStudio.exe).Length / 1MB

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ProPhotoStudio-windows-x64
          path: dist/ProPhotoStudio.exe
          retention-days: 30

      - name: Create release (on tag)
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/ProPhotoStudio.exe
          name: "Desktop ${{ github.ref_name }}"
          draft: false
