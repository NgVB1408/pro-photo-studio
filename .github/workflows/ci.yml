name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test-core:
    name: Core (Python ${{ matrix.python }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false  # uv.lock not generated yet (Phase 2.3)

      - name: Install pps-core + dev tools
        run: |
          uv venv
          uv pip install -e packages/core
          uv pip install pytest pytest-cov pytest-asyncio ruff mypy

      - name: Lint (ruff)
        run: uv run ruff check packages/core

      - name: Format check (ruff)
        run: uv run ruff format --check packages/core
        continue-on-error: true  # legacy code not yet ruff-formatted

      - name: Type check (mypy strict on stable subset)
        run: |
          uv run mypy packages/core/pps_core/twilight.py \
                      packages/core/pps_core/tone_coherency.py \
                      packages/core/pps_core/perspective.py
        continue-on-error: true  # mypy strict is aspirational on legacy modules

      - name: Run tests
        run: uv run pytest packages/core/tests --tb=short -ra

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python == '3.11'
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  custom-secret-scan:
    name: Custom secret scan (project patterns)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Scan tracked files
        run: |
          set -x
          python scripts/check_no_secrets.py $(git ls-files '*.py' '*.md' '*.yaml' '*.yml' '*.toml' '*.json' '*.txt' '*.cfg' '*.ini')

  api:
    name: API (Python ${{ matrix.python }} on ubuntu-latest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: false  # uv.lock not generated yet (Phase 2.3)

      - name: Install pps-core + pps-api + dev tools
        run: |
          uv venv
          uv pip install -e packages/core
          uv pip install -e packages/api
          # Test-only deps not yet declared in pyproject (added per-test-suite as needed):
          uv pip install \
              pytest pytest-asyncio httpx ruff \
              argon2-cffi \
              'sqlalchemy[asyncio]>=2.0' aiosqlite asyncpg \
              aiobotocore

      - name: Lint (ruff)
        run: uv run ruff check packages/api

      - name: Run E2E tests
        run: uv run pytest packages/api/tests --tb=short -ra
