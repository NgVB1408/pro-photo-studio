# LoRA fine-tune config for Qwen-Image-Edit on MIT-Adobe FiveK (expert C).

dataset:
  name: fivek
  expert: c
  split: train
  mirror: null  # None → uses PPS_FIVEK_REPO env or default mirror
  max_rows: 4500  # held-out 500 for eval

model:
  base: lightx2v/Qwen-Image-Lightning
  task: image-to-image

lora:
  rank: 16
  alpha: 32
  dropout: 0.05
  target_modules: ["to_q", "to_k", "to_v", "to_out.0"]

train:
  learning_rate: 1.0e-4
  batch_size: 4
  grad_accumulation: 4    # effective batch 16
  max_steps: 4000
  warmup_steps: 200
  save_every_steps: 500
  mixed_precision: bf16
  gradient_checkpointing: true
  seed: 42

logging:
  wandb_project: pps-qwen-edit
  log_every_steps: 25

output:
  hf_private_repo: null   # set on CLI; must point to a Private repo
  push_every_save: false  # only push on final
