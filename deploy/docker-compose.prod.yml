# Production stack — pulls pre-built images from GHCR, terminates TLS via Caddy.
#
# Required env (read from a deploy-host .env file or platform-managed secrets):
#   - PPS_DOMAIN          e.g. portal.propho.studio
#   - API_DOMAIN          e.g. api.propho.studio
#   - PPS_IMAGE_TAG       e.g. v0.4.0  (or "latest" for canary)
#   - POSTGRES_PASSWORD   strong random
#   - PPS_SECRET_KEY      ≥ 32 chars
#   - S3_ACCESS_KEY / S3_SECRET_KEY  (R2 / Wasabi / AWS IAM credentials)
#   - PPS_API_KEY         server-only key minted via `pps-keys create`
#   - SENTRY_DSN          (optional)
#
# Usage:
#   docker compose -f deploy/docker-compose.prod.yml --env-file /etc/pps/.env up -d
#   docker compose -f deploy/docker-compose.prod.yml --env-file /etc/pps/.env logs -f api

name: pps-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: pps
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: pps
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pps -d pps"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No published port — only the API talks to it on the compose network.

  redis:
    image: redis:7-alpine
    restart: always
    command:
      [
        "redis-server",
        "--save",
        "60",
        "1",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD:-pps-redis-default-rotate-me}",
      ]
    volumes:
      - redisdata:/data
    healthcheck:
      test:
        ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-pps-redis-default-rotate-me}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/ngvb1408/pps-api:${PPS_IMAGE_TAG:-latest}
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PPS_ENV: production
      PPS_LOG_LEVEL: ${PPS_LOG_LEVEL:-INFO}
      PPS_SECRET_KEY: ${PPS_SECRET_KEY:?PPS_SECRET_KEY must be set}
      PPS_REQUIRE_API_KEY: "true"
      PPS_ALLOWED_ORIGINS: https://${PPS_DOMAIN:?PPS_DOMAIN must be set}
      DATABASE_URL: postgresql+asyncpg://pps:${POSTGRES_PASSWORD}@postgres:5432/pps
      REDIS_URL: redis://:${REDIS_PASSWORD:-pps-redis-default-rotate-me}@redis:6379/0
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_BUCKET: ${S3_BUCKET:?S3_BUCKET must be set}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:?S3_ACCESS_KEY must be set}
      S3_SECRET_KEY: ${S3_SECRET_KEY:?S3_SECRET_KEY must be set}
      S3_REGION: ${S3_REGION:-auto}
      SENTRY_DSN: ${SENTRY_DSN:-}
      WORKERS: ${API_WORKERS:-4}
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  web:
    image: ghcr.io/ngvb1408/pps-web:${PPS_IMAGE_TAG:-latest}
    restart: always
    depends_on:
      api:
        condition: service_healthy
    environment:
      PPS_API_URL: http://api:8000
      PPS_API_KEY: ${PPS_API_KEY:?PPS_API_KEY must be set}
      NEXT_PUBLIC_SITE_URL: https://${PPS_DOMAIN}
      NEXT_PUBLIC_BRAND_NAME: ${NEXT_PUBLIC_BRAND_NAME:-Pro Photo Studio}
      NEXT_PUBLIC_BRAND_TAGLINE: ${NEXT_PUBLIC_BRAND_TAGLINE:-Real-estate photo enhancement, automated.}
      NODE_ENV: production
      PORT: "3001"
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/", "-o", "/dev/null"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 5

  caddy:
    image: caddy:2-alpine
    restart: always
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      PPS_DOMAIN: ${PPS_DOMAIN}
      API_DOMAIN: ${API_DOMAIN:?API_DOMAIN must be set}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:
