version: "3.9"
# Run on Oracle Cloud VM (Always Free, ARM 4 cores). Open port 6333 in the
# Oracle Security List + use Caddy/Traefik in front for TLS before exposing
# publicly. Volume mount keeps vectors across container restarts.
services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: pps-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST + gRPC
      - "6334:6334"  # gRPC alternative
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:?set QDRANT_API_KEY in .env}
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz | grep -q ok"]
      interval: 30s
      timeout: 5s
      retries: 5
volumes:
  qdrant_storage:
