# Local development stack — bring up Postgres + Redis + MinIO + API.
#
# Usage:
#   docker compose -f deploy/docker-compose.dev.yml up
#
# Endpoints when running:
#   API:        http://localhost:8000  (Swagger at /docs)
#   MinIO:      http://localhost:9001  (admin / minioadmin / minioadmin)
#   Postgres:   localhost:5432         (user pps / pass pps / db pps)
#   Redis:      localhost:6379

name: pps-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: pps-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pps
      POSTGRES_PASSWORD: pps
      POSTGRES_DB: pps
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pps -d pps"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pps-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: pps-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: pps-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb -p local/pps-dev || true;
        mc anonymous set download local/pps-dev || true;
        echo 'minio bucket pps-dev ready';
      "
    restart: "no"

  api:
    build:
      context: ..
      dockerfile: deploy/docker/Dockerfile.api
    container_name: pps-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      PPS_ENV: development
      PPS_LOG_LEVEL: INFO
      PPS_SECRET_KEY: dev-only-min-32-chars-secret-replace-in-prod
      DATABASE_URL: postgresql+asyncpg://pps:pps@postgres:5432/pps
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_BUCKET: pps-dev
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_REGION: auto
      WORKERS: "2"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5

volumes:
  pgdata:
  redisdata:
  miniodata:
